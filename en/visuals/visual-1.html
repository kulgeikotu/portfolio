<!doctype html>
<html lang="en">
<head>
  {{> head-meta }}
  {{> head-analytics }}
  <script type="module" src="/src/js/main.js"></script>
</head>
<body class="visual-page visual-page--dark">
  {{> visual-nav current=1 }}

  <main class="visual-main">
    <section class="visual-hero container">
      <h1 class="visual-hero__title reveal">Mood<br>tracker</h1>
      <div class="visual-shot-row visual-shot-row--narrow" style="--shot-row-cols:2">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/hero-main.webp" alt="Main weekly mood diary screen broken down by anxiety, calm and sadness" width="1572" height="3408" fetchpriority="high" loading="eager" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/hero-card.webp" alt="«Alice's mood» card broken down by anxiety, calm and sadness" width="1572" height="3408" loading="eager" decoding="async">
        </figure>
      </div>
    </section>

    <section class="visual-section visual-wide container">
      <h2 class="visual-section__title reveal reveal--fade">Adding an emotion</h2>
      <div class="visual-shot-row" style="--shot-row-cols:6; --shot-row-cols-mobile:3">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-empty.webp" alt="Empty diary with a prompt to add the first emotion" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-menu.webp" alt="Quick action menu on long-press: AI, add emotion, note" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="2" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-choose.webp" alt="Choosing an emotion: anxiety, sadness, calm, or «not sure»" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="3" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-swipe-hint.webp" alt="Hint to adjust the emotion's intensity by swiping up or down" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="4" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-swipe-before.webp" alt="Added «Calm» emotion at minimal intensity" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="5" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-swipe-after.webp" alt="«Calm» intensity increased to 50% by swiping" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
      </div>
    </section>

    <section class="visual-section container">
      <h2 class="visual-section__title reveal reveal--fade">Light theme</h2>
      <div class="visual-shot-row" style="--shot-row-cols:3">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/light-theme-diary-1.webp" alt="Main diary screen in light theme, low anxiety variant" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/light-theme-diary-2.webp" alt="Main diary screen in light theme, high anxiety variant" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="2" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/light-theme-card.webp" alt="«Alice's mood» card in light theme" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
      </div>
    </section>
  </main>

  {{> visual-footer current=1 prev=5 next=2 }}

</body>
</html>
