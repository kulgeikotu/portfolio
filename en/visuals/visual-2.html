<!doctype html>
<html lang="en">
<head>
  {{> head-meta }}
  {{> head-analytics }}
  <script type="module" src="/src/js/main.js"></script>
</head>
<body class="visual-page visual-page--dark">
  {{> visual-nav current=2 }}

  <main class="visual-main">
    <section class="visual-hero container">
      <h1 class="visual-hero__title reveal">Smart home</h1>
      <div class="visual-shot-stack">
        <div class="visual-shot-row visual-shot-row--narrow" style="--shot-row-cols:2">
          <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1572/3408">
            <img src="/images/shared/visuals/visual-2/home-devices-1.webp" alt="Home screen with a room map and device toggles" width="1572" height="3408" fetchpriority="high" loading="eager" decoding="async">
          </figure>
          <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1572/3408">
            <img src="/images/shared/visuals/visual-2/home-devices-2.webp" alt="Full device list filterable by room" width="1572" height="3408" loading="eager" decoding="async">
          </figure>
        </div>
        <div class="visual-shot-row visual-shot-row--narrow" style="--shot-row-cols:2">
          <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1572/3408">
            <img src="/images/shared/visuals/visual-2/lamp-control-1.webp" alt="Lamp card on the home screen" width="1572" height="3408" loading="lazy" decoding="async">
          </figure>
          <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1572/3408">
            <img src="/images/shared/visuals/visual-2/lamp-control-2.webp" alt="Lamp control screen: brightness, presets and color picker" width="1572" height="3408" loading="lazy" decoding="async">
          </figure>
        </div>
      </div>
    </section>
  </main>

  {{> visual-footer current=2 prev=1 next=3 }}

</body>
</html>
