<!doctype html>
<html lang="en">
<head>
  {{> head-meta }}
  {{> head-analytics }}
  <script type="module" src="/src/js/main.js"></script>
</head>
<body class="visual-page visual-page--dark" style="--visual-page-bg:#2F2B27">
  {{> visual-nav current=5 }}

  <main class="visual-main">
    <section class="visual-hero container">
      <h1 class="visual-hero__title reveal">Excursion<br>booking</h1>
      <div class="visual-shot-stack">
        <div class="visual-shot-row visual-shot-row--narrow" style="--shot-row-cols:2">
          <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1500/3248">
            <img src="/images/shared/visuals/visual-5/excursions-search-1.webp" alt="City excursion search screen" width="1500" height="3248" fetchpriority="high" loading="eager" decoding="async">
          </figure>
          <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1500/3248">
            <img src="/images/shared/visuals/visual-5/excursions-search-2.webp" alt="Search results for Saint Petersburg with filters and dates" width="1500" height="3248" loading="eager" decoding="async">
          </figure>
        </div>
        <div class="visual-shot-row visual-shot-row--narrow" style="--shot-row-cols:2">
          <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1500/3248">
            <img src="/images/shared/visuals/visual-5/excursion-details-1.webp" alt="Excursion card «How the Tolstoy House works»" width="1500" height="3248" loading="lazy" decoding="async">
          </figure>
          <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1500/3968">
            <img src="/images/shared/visuals/visual-5/excursion-details-2.webp" alt="Booking screen: meeting point, reviews and time slots" width="1500" height="3968" loading="lazy" decoding="async">
          </figure>
        </div>
      </div>
    </section>
  </main>

  {{> visual-footer current=5 prev=4 next=1 }}

</body>
</html>
