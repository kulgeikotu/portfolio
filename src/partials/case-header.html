{{!-- Хедер для страниц кейсов — только «назад» и контакт в ТГ.
    Подключается вместо основного header-партиала на cases/*.html. --}}
<header class="case-header">
  <div class="container case-header__inner">
    <a href="{{ t.[caseHeader.homeHref] }}#{{ currentCaseId }}" class="case-header__back" aria-label="{{ t.[caseHeader.back] }}">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7.99213 7C8.75 7.75799 8.75 7.7575 9.05365 8.06152L5.56049 11.5537H20.7499V13.0537H5.56049L9.05365 16.5459C8.29584 17.3037 8.75 16.8496 7.99213 17.6074L3.21967 12.834C2.92678 12.5411 2.92678 12.0663 3.21967 11.7734L7.99213 7Z" fill="currentColor"/></svg>
    </a>

    <a class="case-header__contact" href="https://telegram.me/kulgeiko" target="_blank" rel="noopener" data-track="telegram_open">
      <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M12.5913 3C12.9718 3 13.2803 3.30844 13.2803 3.68893C13.2803 3.68893 13.2803 7.46788 13.2803 9.88926C12.7358 9.88926 12.5913 9.88926 11.9024 9.88926C11.9024 8.11737 11.9024 5.35204 11.9024 5.35204L2.97419 14.2803L2 13.3061L10.9282 4.37785H6.39101C6.39101 3.68893 6.39101 3.86116 6.39101 3H12.5913Z" fill="currentColor" stroke="currentColor" stroke-width="0.3"/></svg>
      {{ t.[contacts.telegram] }}
    </a>
  </div>
</header>
