<!doctype html>
<html lang="ru">
<head>
  {{> head-meta }}
  {{> head-analytics }}
  <script type="module" src="/src/js/main.js"></script>
</head>
<body class="visual-page visual-page--dark">
  {{> visual-nav current=5 }}

  <main class="visual-main">
    <section class="visual-hero container">
      <h1 class="visual-hero__title reveal">Бронирование<br>экскурсий</h1>
      <div class="visual-shot-stack">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:2442/2436">
          <img src="/images/shared/visuals/visual-5/excursions-search.webp" alt="Экран поиска экскурсий по городу и результаты поиска по Санкт-Петербургу с фильтрами и датами" width="2442" height="2436" fetchpriority="high" loading="eager" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:2442/2976">
          <img src="/images/shared/visuals/visual-5/excursion-details.webp" alt="Карточка экскурсии «Как устроен Толстовский Дом» и экран бронирования с местом встречи, отзывами и выбором времени" width="2442" height="2976" loading="lazy" decoding="async">
        </figure>
      </div>
    </section>
  </main>

  {{> visual-footer current=5 prev=4 next=1 }}

</body>
</html>
