<!doctype html>
<html lang="ru">
<head>
  {{> head-meta }}
  {{> head-analytics }}
  <script type="module" src="/src/js/main.js"></script>
</head>
<body class="visual-page visual-page--dark">
  {{> visual-nav current=1 }}

  <main class="visual-main">
    <section class="visual-hero container">
      <h1 class="visual-hero__title reveal">Трекер<br>настроения</h1>
      <div class="visual-shot-row visual-shot-row--narrow" style="--shot-row-cols:2">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/hero-main.webp" alt="Главный экран дневника настроения за неделю с разбивкой по тревоге, спокойствию и грусти" width="1572" height="3408" fetchpriority="high" loading="eager" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/hero-card.webp" alt="Карточка «Настроение Алисы» с разбивкой по тревоге, спокойствию и грусти" width="1572" height="3408" loading="eager" decoding="async">
        </figure>
      </div>
    </section>

    <section class="visual-section visual-wide container">
      <h2 class="visual-section__title reveal reveal--fade">Добавление эмоции</h2>
      <div class="visual-shot-row" style="--shot-row-cols:6; --shot-row-cols-mobile:3">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-empty.webp" alt="Пустой дневник с подсказкой добавить первую эмоцию" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-menu.webp" alt="Меню быстрых действий по удержанию кнопки: AI, добавление эмоции, заметка" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="2" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-choose.webp" alt="Выбор эмоции: тревога, грусть, спокойствие или «не понимаю эмоцию»" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="3" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-swipe-hint.webp" alt="Подсказка настроить силу эмоции свайпом вверх или вниз" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="4" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-swipe-before.webp" alt="Добавленная эмоция «Спокойствие» с минимальной силой" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="5" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/emotions-swipe-after.webp" alt="Сила эмоции «Спокойствие» увеличена свайпом до 50%" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
      </div>
    </section>

    <section class="visual-section container">
      <h2 class="visual-section__title reveal reveal--fade">Светлая тема</h2>
      <div class="visual-shot-row" style="--shot-row-cols:3">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/light-theme-diary-1.webp" alt="Главный экран дневника в светлой теме, вариант с низким уровнем тревоги" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/light-theme-diary-2.webp" alt="Главный экран дневника в светлой теме, вариант с высоким уровнем тревоги" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="2" style="--shot-ratio:1572/3408">
          <img src="/images/shared/visuals/visual-1/light-theme-card.webp" alt="Карточка «Настроение Алисы» в светлой теме" width="1572" height="3408" loading="lazy" decoding="async">
        </figure>
      </div>
    </section>
  </main>

  {{> visual-footer current=1 prev=5 next=2 }}

</body>
</html>
