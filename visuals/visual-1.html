<!doctype html>
<html lang="ru">
<head>
  {{> head-meta }}
  {{> head-analytics }}
  <script type="module" src="/src/js/main.js"></script>
</head>
<body class="visual-page visual-page--dark">
  {{> visual-nav current=1 }}

  <main class="visual-main">
    <section class="visual-hero container">
      <h1 class="visual-hero__title reveal">Трекер<br>настроения</h1>
      <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:2553/2556; --shot-ratio-mobile:2505/2556">
        <picture>
          <source media="(max-width:900px)" srcset="/images/shared/visuals/visual-1/hero-mobile.webp">
          <img src="/images/shared/visuals/visual-1/hero-desktop.webp" alt="Главный экран дневника настроения за неделю и карточка «Настроение Алисы» с разбивкой по тревоге, спокойствию и грусти" width="2553" height="2556" fetchpriority="high" loading="eager" decoding="async">
        </picture>
      </figure>
    </section>

    <section class="visual-section visual-wide container">
      <h2 class="visual-section__title reveal reveal--fade">Добавление эмоции</h2>
      <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:8034/2556; --shot-ratio-mobile:3720/5160">
        <picture>
          <source media="(max-width:900px)" srcset="/images/shared/visuals/visual-1/emotions-mobile.webp">
          <img src="/images/shared/visuals/visual-1/emotions-desktop.webp" alt="Флоу добавления эмоции: пустой дневник, выбор эмоции, настройка силы эмоции свайпом, готовая запись" width="8034" height="2556" loading="lazy" decoding="async">
        </picture>
      </figure>
    </section>

    <section class="visual-section container">
      <h2 class="visual-section__title reveal reveal--fade">Светлая тема</h2>
      <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:3921/2556; --shot-ratio-mobile:3633/2556">
        <picture>
          <source media="(max-width:900px)" srcset="/images/shared/visuals/visual-1/light-theme-mobile.webp">
          <img src="/images/shared/visuals/visual-1/light-theme-desktop.webp" alt="Трекер настроения в светлой теме: дневник за неделю и карточка «Настроение Алисы»" width="3921" height="2556" loading="lazy" decoding="async">
        </picture>
      </figure>
    </section>
  </main>

  {{> visual-footer current=1 prev=5 next=2 }}

</body>
</html>
