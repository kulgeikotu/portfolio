<!doctype html>
<html lang="ru">
<head>
  {{> head-meta }}
  {{> head-analytics }}
  <script type="module" src="/src/js/main.js"></script>
</head>
<body class="visual-page visual-page--dark">
  {{> visual-nav current=2 }}

  <main class="visual-main">
    <section class="visual-hero container">
      <h1 class="visual-hero__title reveal">Умный дом</h1>
      <div class="visual-shot-stack">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:2550/2556">
          <img src="/images/shared/visuals/visual-2/home-devices.webp" alt="Главный экран дома со схемой комнат и переключателями устройств, список всех устройств с фильтром по комнатам" width="2550" height="2556" fetchpriority="high" loading="eager" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:2550/2556">
          <img src="/images/shared/visuals/visual-2/lamp-control.webp" alt="Карточка лампы на главном экране и экран управления лампой: яркость, пресеты и выбор цвета" width="2550" height="2556" loading="lazy" decoding="async">
        </figure>
      </div>
    </section>
  </main>

  {{> visual-footer current=2 prev=1 next=3 }}

</body>
</html>
