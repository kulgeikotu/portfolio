<!doctype html>
<html lang="ru">
<head>
  {{> head-meta }}
  {{> head-analytics }}
  <script type="module" src="/src/js/main.js"></script>
</head>
<body class="visual-page visual-page--light">
  {{> visual-nav current=4 }}

  <main class="visual-main">
    <section class="visual-hero visual-hero--lg container">
      <h1 class="visual-hero__title reveal">Статистика<br>встреч</h1>
      <div class="visual-shot-stack">
        <figure class="visual-shot reveal reveal--fade" style="--shot-ratio:4320/2754">
          <img src="/images/shared/visuals/visual-4/analytics-overview.webp" alt="Раздел «Аналитика»: количество созданных, завершённых, перенесённых и отменённых встреч, графики динамики и распределения по длительности" width="4320" height="2754" fetchpriority="high" loading="eager" decoding="async">
        </figure>
        <figure class="visual-shot reveal reveal--fade" data-delay="1" style="--shot-ratio:4320/2754">
          <img src="/images/shared/visuals/visual-4/analytics-details.webp" alt="Продолжение раздела: популярное время и типы встреч, пользователи с наибольшим и наименьшим числом встреч" width="4320" height="2754" loading="lazy" decoding="async">
        </figure>
      </div>
    </section>
  </main>

  {{> visual-footer current=4 prev=3 next=5 }}

</body>
</html>
